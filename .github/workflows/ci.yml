name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm run build
        env:
          DATABASE_URL: postgresql://opencrm:opencrm@localhost:5432/opencrm
          BETTER_AUTH_SECRET: ci-build-secret-at-least-32-characters-long
          BETTER_AUTH_URL: http://localhost:3000
          APP_URL: http://localhost:3000
