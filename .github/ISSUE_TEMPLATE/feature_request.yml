name: Feature request
description: Suggest an idea for open-crm
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
      placeholder: As a small sales team, I need…
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should it work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This is not a full marketing automation / dialer / ERP feature
          required: false
        - label: I am willing to help implement this
          required: false
