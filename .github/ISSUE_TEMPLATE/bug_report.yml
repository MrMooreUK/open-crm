name: Bug report
description: Something is broken or behaves unexpectedly
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Security issues? See [SECURITY.md](../../SECURITY.md).
  - type: textarea
    id: describe
    attributes:
      label: What happened?
      description: Clear description of the bug
      placeholder: When I drag a deal to Won, …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to …
        2. Click …
        3. See error
    validations:
      required: true
  - type: dropdown
    id: install
    attributes:
      label: How are you running open-crm?
      options:
        - Docker Compose
        - Local npm run dev
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: 0.1.0 or git SHA
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste relevant terminal or browser console output
