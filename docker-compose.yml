# open-crm — one-command install
#
#   docker compose up -d
#   open http://localhost:3000
#
# Production checklist:
#   - Copy .env.example → .env and set a strong BETTER_AUTH_SECRET
#   - Set BETTER_AUTH_URL / APP_URL to your public HTTPS URL
#   - Do not expose Postgres to the public internet (default binds localhost only)
#   - Change POSTGRES_PASSWORD for anything beyond local demos
# See docs/install.md and SECURITY.md

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: opencrm
      # Demo default only — override via .env for any shared host
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opencrm}
      POSTGRES_DB: opencrm
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Bind to loopback so the DB is not reachable from the LAN/internet by default
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opencrm -d opencrm"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Always use the internal compose network hostname `db` (do not point this at localhost)
      DATABASE_URL: postgresql://opencrm:${POSTGRES_PASSWORD:-opencrm}@db:5432/opencrm
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dev-secret-change-me-in-production-32chars}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      APP_URL: ${APP_URL:-http://localhost:3000}
      NODE_ENV: production
    volumes:
      # Persist logos, avatars, and other user uploads (not in git)
      - uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
